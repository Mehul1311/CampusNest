name: Build → Push to Docker Hub → Deploy Frontend

on:
  push:
    branches: [deploy]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: Build check
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

  # Job 2: Docker build and deploy
  docker-build-and-deploy:
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space on runner
        run: |
          echo "🧹 Cleaning up disk space on GitHub runner..."
          echo "📊 Disk space before cleanup:"
          df -h /

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

          sudo apt-get clean
          sudo apt-get autoremove -y

          docker system prune -af --volumes || true
          docker rmi $(docker images -q) 2>/dev/null || true

          echo "📊 Disk space after cleanup:"
          df -h /

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push image (SHA + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/campus-olx-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/campus-olx-frontend:latest

      - name: Start ssh-agent and add private key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Deploy to EC2
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "DOCKER_USERNAME='$DOCKER_USERNAME' DOCKER_TOKEN='$DOCKER_TOKEN' IMAGE_SHA='$IMAGE_SHA' bash -s" << 'ENDSSH'
            set -e

            CONTAINER_NAME="campus-olx-frontend"
            IMAGE_NEW="${DOCKER_USERNAME}/campus-olx-frontend:${IMAGE_SHA}"

            echo "=========================================="
            echo "🚀 Starting frontend deployment..."
            echo "=========================================="

            echo "🧹 Starting cleanup..."
            echo "📊 Disk space BEFORE cleanup:"
            df -h / | tail -1

            echo "🛑 Stopping frontend container: $CONTAINER_NAME"
            sudo docker stop $CONTAINER_NAME 2>/dev/null || echo "  Container not running"
            sudo docker rm -f $CONTAINER_NAME 2>/dev/null || echo "  Container not found"

            echo "🗑️ Removing ALL frontend images..."
            sudo docker images --format '{{.Repository}}:{{.Tag}}' | grep 'campus-olx-frontend' | xargs -r sudo docker rmi -f 2>/dev/null || true

            echo "🗑️ Removing stopped containers..."
            sudo docker container prune -f || true
            echo "🗑️ Removing dangling images..."
            sudo docker image prune -f || true
            echo "🗑️ Removing unused volumes..."
            sudo docker volume prune -f || true
            echo "🗑️ Removing ALL build cache..."
            sudo docker builder prune -af || true
            sudo rm -rf /var/lib/docker/tmp/* 2>/dev/null || true

            echo "📊 Disk space AFTER cleanup:"
            df -h / | tail -1

            echo "$DOCKER_TOKEN" | sudo docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "📥 Pulling new image: $IMAGE_NEW"
            sudo docker pull $IMAGE_NEW

            echo "🚀 Starting new container..."
            if sudo docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 3003:3000 \
              $IMAGE_NEW; then

              echo "⏳ Waiting for container to be healthy..."
              sleep 10

              if sudo docker ps | grep -q $CONTAINER_NAME; then
                echo "✅ Frontend deployment successful!"
                sudo docker image prune -f || true
                echo "📊 Final disk space:"
                df -h / | tail -1
                echo "📦 Running containers:"
                sudo docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
              else
                echo "❌ Container stopped unexpectedly!"
                sudo docker logs $CONTAINER_NAME 2>&1 || true
                exit 1
              fi
            else
              echo "❌ Failed to start container!"
              exit 1
            fi

            echo "=========================================="
            echo "✅ Frontend deployment complete!"
            echo "=========================================="
          ENDSSH
        shell: bash